<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aero Eagle Reports Portal</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
text-align:center;
padding-top:100px;
}

.container{
background:white;
padding:40px;
width:420px;
margin:auto;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

h2{
margin-bottom:5px;
}

/* PASSWORD FIELD */

.password-box{
position:relative;
display:inline-block;
}

input{
padding:12px;
width:240px;
margin:10px;
border:2px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
border-color:#0078D4;
outline:none;
box-shadow:0 0 5px rgba(0,120,212,0.4);
}

/* EYE BUTTON */

.eye{
position:absolute;
right:20px;
top:22px;
cursor:pointer;
font-size:18px;
color:#666;
}

/* LOGIN BUTTON */

button{
padding:10px 24px;
background:#0078D4;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#005fa3;
}

/* DOWNLOAD BUTTONS */

a{
display:block;
margin:14px;
padding:13px;
background:#0078D4;
color:white;
text-decoration:none;
border-radius:6px;
font-size:15px;
transition:0.3s;
}

a:hover{
background:#005fa3;
transform:scale(1.03);
}

/* LOGOUT BUTTON */

.logout{
background:#e74c3c;
margin-top:25px;
}

.logout:hover{
background:#c0392b;
}

/* ERROR MESSAGE */

#error{
color:white;
background:#e74c3c;
padding:8px;
border-radius:5px;
display:none;
margin-top:10px;
font-size:14px;
}

#content{
display:none;
margin-top:25px;
}

</style>

<script>

/* PASSWORD CHECK */

function checkPassword(){

var password = document.getElementById("password").value;

if(password === "Aero123"){

document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";

}else{

document.getElementById("error").style.display="block";
document.getElementById("password").style.borderColor="#e74c3c";
document.getElementById("password").value="";

}

}

/* PASSWORD SHOW/HIDE */

function togglePassword(){

var input = document.getElementById("password");

if(input.type === "password"){
input.type="text";
}else{
input.type="password";
}

}

/* ENTER KEY LOGIN + ERROR RESET */

document.addEventListener("DOMContentLoaded", function(){

var input = document.getElementById("password");

input.addEventListener("keypress", function(event){
if(event.key === "Enter"){
checkPassword();
}
});

input.addEventListener("input", function(){
document.getElementById("error").style.display="none";
input.style.borderColor="#ccc";
});

});

/* LOGOUT FUNCTION */

function logout(){

document.getElementById("content").style.display="none";
document.getElementById("login").style.display="block";

document.getElementById("password").value="";
document.getElementById("error").style.display="none";
document.getElementById("password").style.borderColor="#ccc";

}

</script>

</head>

<body>

<div class="container">

<div id="login">

<h2>Aero Eagle</h2>
<p><b>Maintenance Report Portal</b></p>

<p>Enter Password to Access Reports</p>

<div class="password-box">

<input type="password" id="password" placeholder="Enter password">

<span class="eye" onclick="togglePassword()">👁</span>

</div>

<br>

<button onclick="checkPassword()">Login</button>

<div id="error">
Wrong Password. Please try again.
</div>

</div>


<div id="content">

<h3>Download Sample Reports</h3>

<a href="https://1drv.ms/b/c/bccc0999596dc156/IQA0Nh1CBJIOTL9s0FAGevqAAU_0r9TkjQc3Pxv0ylKFOTE?e=z8AuLv" target="_blank">
📄 AIR Sample Report
</a>

<a href="https://1drv.ms/b/c/bccc0999596dc156/IQDhn8Ana_iuR7XM5XHx06CJAeccpU2HxuLBIZUVFQYckkk?e=2xd4Gq" target="_blank">
📄 10 Days Maintenance Sample Report
</a>

<a href="https://1drv.ms/b/c/bccc0999596dc156/IQAUBNA9UJifQ4NZlzMwgLwXASMgzOvkkMKVC8vfqh4C5iE?e=h6EcmK" target="_blank">
📄 Daily Inspection Sample Report
</a>

<a href="https://1drv.ms/b/c/bccc0999596dc156/IQCSNYmtDarCS7-_y27oCCtaAY14vel4YzBpFg35lCS-BYM?e=UcuIc5" target="_blank">
📄 High Voltage System Sample Report
</a>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

</body>
</html>
