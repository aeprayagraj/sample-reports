<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aero Eagle Reports Portal</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
text-align:center;
padding-top:100px;
}

.container{
background:white;
padding:40px;
width:420px;
margin:auto;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* PASSWORD BOX */

.password-box{
position:relative;
display:inline-block;
}

input{
padding:12px;
width:220px;
margin:10px;
border:2px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
border-color:#0078D4;
outline:none;
box-shadow:0 0 5px rgba(0,120,212,0.4);
}

/* EYE ICON */

.eye{
position:absolute;
right:20px;
top:20px;
cursor:pointer;
font-size:18px;
color:#777;
}

.eye:hover{
color:#000;
}

/* LOGIN BUTTON */

button{
padding:10px 24px;
background:#0078D4;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#005fa3;
}

/* DOWNLOAD BUTTONS */

a{
display:block;
margin:14px;
padding:13px;
background:#0078D4;
color:white;
text-decoration:none;
border-radius:6px;
font-size:15px;
transition:0.3s;
}

a:hover{
background:#005fa3;
transform:scale(1.03);
}

/* ERROR MESSAGE */

#error{
color:white;
background:#e74c3c;
padding:8px;
border-radius:5px;
display:none;
margin-top:10px;
font-size:14px;
}

#content{
display:none;
margin-top:25px;
}

</style>

<script>

function checkPassword(){

var password = document.getElementById("password").value;

if(password === "Aero123"){

document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";

}else{

document.getElementById("error").style.display="block";
document.getElementById("password").style.borderColor="#e74c3c";

}

}

/* SHOW HIDE PASSWORD */

function togglePassword(){

var input = document.getElementById("password");
var eye = document.getElementById("eye");

if(input.type === "password"){
input.type = "text";
eye.innerHTML="🙈";
}else{
input.type = "password";
eye.innerHTML="👁";
}

}

/* ENTER KEY LOGIN */

document.addEventListener("DOMContentLoaded", function(){
document.getElementById("password").addEventListener("keypress", function(event){
if(event.key === "Enter"){
checkPassword();
}
});
});

</script>

</head>

<body>

<div class="container">

<div id="login">

<h2>Aero Eagle</h2>
<p><b>Maintenance Report Portal</b></p>

<p>Enter Password to Access Reports</p>

<div class="password-box">

<input type="password" id="password" placeholder="Enter password">

<span id="eye" class="eye" onclick="togglePassword()">👁</span>

</div>

<br>

<button onclick="checkPassword()">Login</button>

<div id="error">
Wrong Password. Please try again.
</div>

</div>

<div id="content">

<h3>Download Sample Reports</h3>

</div>

</div>

</body>
</html>
